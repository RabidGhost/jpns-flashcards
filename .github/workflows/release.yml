name: Release

on:
  push:
    tags: "*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: sudo apt-get install -y fonts-ibm-plex fonts-noto-cjk

      - name: Compile flashcards to PDF
        run: find flashcards -name "*.typ" -exec typst compile {} --root . \;

      - name: Generate release notes
        run: |
          echo "release ${{ github.ref_name }} flashcards" > release-notes.md
          echo "" >> release-notes.md
          for pdf in flashcards/*.pdf; do
            name=$(basename "$pdf")
            echo "- [${name}](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${name})" >> release-notes.md
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: flashcards/*.pdf
          body_path: release-notes.md

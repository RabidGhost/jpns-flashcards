name: Typst Format

on:
  pull_request:
    branches:
      - main
    paths:
      - "*.typ"

jobs:
  typstyle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: ${{ github.head_ref }}
      - name: Run typstyle
        uses: typstyle-rs/typstyle-action@main
        with:
          opts: ["--check"]
      - name: Push
        uses: stefanzweifel/git-auto-commit-action@master
        with:
          commit_message: "style: format using typstyle"

name: Typst Format

on:
  pull_request:
    branches:
      - main
    paths:
      - "*.typ"

jobs:
  typstyle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
      - name: Run typstyle
        uses: typstyle-rs/typstyle-action@main
        with:
          opts: "--check"
